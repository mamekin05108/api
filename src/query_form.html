{% load django_bootstrap5 %}
{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>返済管理ダッシュボード</title>
    
    {% bootstrap_css %}
    <link rel="stylesheet" href="{% static 'Hensai/fontawesome/css/all.min.css' %}">
    
    <style>
        /* ダッシュボード全体のレイアウト調整 */
        body {
            min-height: 100vh;
            display: flex;
            background-color: #f4f6f9;
            overflow: hidden;
        }
        
        /* 左サイドバー */
        #sidebar {
            width: 260px;
            min-width: 260px;
            background-color: #212529;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        
        /* メインエリア */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-link {
            color: #adb5bd;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            border-left: 4px solid transparent;
            font-size: 15px;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background-color: #2c3034;
            color: #fff;
            border-left-color: #0d6efd;
        }
        
        /* コード表示ダイアログ */
        pre {
            background-color: #1e1e1e;
            color: #d4d4d4;
            border-radius: 6px;
            padding: 15px;
            height: 250px;
            overflow: auto;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid #333;
            margin-bottom: 0;
        }
        
        .card {
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .card-header {
            background-color: #ffffff;
            border-bottom: 1px solid #ebebeb;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 左サイドバー -->
    <div id="sidebar">
        <div class="p-3 border-bottom border-secondary text-center">
            <h5 class="mb-0 text-info fw-bold">
                <i class="fa-solid fa-gauge-high me-1"></i> 管理ダッシュボード
            </h5>
        </div>
        <div class="mt-3">
            <p class="text-uppercase text-muted px-3 small fw-bold mb-1">アプリケーション</p>
            <a href="#" class="sidebar-link active">
                <i class="fa-solid fa-file-invoice-dollar me-2"></i> 返済管理 (Hensai)
            </a>
            <a href="#" class="sidebar-link">
                <i class="fa-solid fa-users-gear me-2"></i> 顧客管理
            </a>
            <a href="#" class="sidebar-link">
                <i class="fa-solid fa-receipt me-2"></i> 帳票作成履歴
            </a>
        </div>
    </div>

    <!-- 右メインコンテンツエリア -->
    <div id="main-content" class="p-4">
        
        <!-- ヘッダー部分 -->
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
            <h4 class="mb-0 fw-bold text-dark">
                <i class="fa-solid fa-file-invoice-dollar text-primary me-2"></i> 返済顧客クエリ ゲートウェイ
            </h4>
            <div class="text-muted small">
                ユーザー: 開発担当管理者 <i class="fa-solid fa-circle-user ms-1"></i>
            </div>
        </div>

        <!-- 【右上】 入力パラメータ設定（横2カラム折り返し） -->
        <div class="card mb-4">
            <div class="card-header d-flex align-items-center">
                <i class="fa-solid fa-sliders text-primary me-2"></i> パラメータ入力設定
            </div>
            <div class="card-body">
                <form id="queryForm">
                    {% csrf_token %}
                    
                    <!-- 横2列の入力項目（3つ以上増えても自動で折り返します） -->
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="shopId" class="form-label fw-bold">店番 (shop_id)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-shop"></i></span>
                                <input type="text" class="form-control" id="shopId" name="shop_id" placeholder="例: 123" required value="123">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="customerId" class="form-label fw-bold">顧客番号 (customer_id)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                                <input type="text" class="form-control" id="customerId" name="customer_id" placeholder="例: 987654" required value="987654">
                            </div>
                        </div>
                        <!-- ※ここに項目を追加すると自動的に下の行に並びます -->
                    </div>

                    <!-- 三択処理モード選択（横並び） -->
                    <div class="mt-4 p-3 bg-light rounded border">
                        <label class="form-label d-block mb-3 fw-bold">
                            <i class="fa-solid fa-route text-secondary me-1"></i> 送信先設定（処理モード）
                        </label>
                        <div class="row g-2">
                            <div class="col-md-4">
                                <div class="form-check p-2 border rounded bg-white ms-2">
                                    <input class="form-check-input ms-1 me-2" type="radio" name="action_type" id="actionA" value="A">
                                    <label class="form-check-label fw-bold text-primary" for="actionA">
                                        <i class="fa-solid fa-paper-plane me-1"></i> ① A先に発信 ＋ 保存
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-check p-2 border rounded bg-white ms-2">
                                    <input class="form-check-input ms-1 me-2" type="radio" name="action_type" id="actionB" value="B">
                                    <label class="form-check-label fw-bold text-success" for="actionB">
                                        <i class="fa-solid fa-paper-plane me-1"></i> ② B先に発信 ＋ 保存
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-check p-2 border rounded bg-white ms-2">
                                    <input class="form-check-input ms-1 me-2" type="radio" name="action_type" id="actionNone" value="none" checked>
                                    <label class="form-check-label fw-bold text-secondary" for="actionNone">
                                        <i class="fa-solid fa-floppy-disk me-1"></i> ③ 発信せず保存のみ
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 送信実行ボタン -->
                    <div class="mt-3 text-end">
                        <button type="submit" class="btn btn-primary px-5 py-2" id="submitBtn">
                            <i class="fa-solid fa-play me-1"></i> 処理を実行
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 【右下】 Request / Response 並列ダイアログ ＆ Excelボタン -->
        <div class="row g-4 mb-4">
            <!-- 左側: Request JSON -->
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <span><i class="fa-solid fa-arrow-right-to-bracket text-warning me-2"></i> 送信 Request JSON</span>
                        <span class="badge bg-secondary">Client → Proxy</span>
                    </div>
                    <div class="card-body">
                        <pre id="requestLog">送信前です。</pre>
                    </div>
                </div>
            </div>

            <!-- 右側: Response JSON ＆ エクスポート -->
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <span><i class="fa-solid fa-reply text-success me-2"></i> 受信 Response JSON</span>
                        <span class="badge bg-secondary" id="statusBadge">待機中</span>
                    </div>
                    <div class="card-body d-flex flex-column justify-content-between" style="min-height: 250px;">
                        <pre id="responseLog" class="mb-3">レスポンスデータはありません。</pre>
                        
                        <!-- Excelエクスポートボタン（初期状態は無効） -->
                        <button type="button" class="btn btn-success w-100 py-2fw-bold" id="exportBtn" disabled>
                            <i class="fa-solid fa-file-excel me-1"></i> Excel帳票をダウンロードする
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    {% bootstrap_javascript %}

    <script>
        // 生成されたExcelのダウンロードパスを保持する一時変数
        let currentExcelPath = null;

        document.getElementById('queryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const shopId = document.getElementById('shopId').value;
            const customerId = document.getElementById('customerId').value;
            const actionType = document.querySelector('input[name="action_type"]:checked').value;
            
            const requestLog = document.getElementById('requestLog');
            const responseLog = document.getElementById('responseLog');
            const submitBtn = document.getElementById('submitBtn');
            const statusBadge = document.getElementById('statusBadge');
            const exportBtn = document.getElementById('exportBtn');
            
            // Excelボタンを一旦初期化
            exportBtn.disabled = true;
            currentExcelPath = null;

            // 送信予定のデータを左側の Request JSON に表示
            const clientPayload = { shop_id: shopId, customer_id: customerId, action_type: actionType };
            requestLog.textContent = JSON.stringify(clientPayload, null, 4);

            // 送信ステータスに変更
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> 実行中...';
            statusBadge.className = "badge bg-warning text-dark";
            statusBadge.textContent = "送信中";
            responseLog.textContent = "データを処理中...";

            try {
                const response = await fetch('/api/external-proxy/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify(clientPayload)
                });

                const contentType = response.headers.get("content-type");
                
                if (response.ok && contentType && contentType.includes("application/json")) {
                    const data = await response.json();
                    responseLog.textContent = JSON.stringify(data, null, 4);
                    statusBadge.className = "badge bg-success";
                    statusBadge.textContent = `成功 (HTTP ${response.status})`;

                    // ★ レスポンスにExcelの保存先（saved_excel_to）があれば、ダウンロードボタンを有効化
                    if (data.saved_excel_to) {
                        currentExcelPath = data.saved_excel_to;
                        exportBtn.disabled = false; // ボタンを活性化
                    }
                } else {
                    statusBadge.className = "badge bg-danger";
                    statusBadge.textContent = `エラー (HTTP ${response.status})`;
                    if (contentType && contentType.includes("application/json")) {
                        const data = await response.json();
                        responseLog.textContent = JSON.stringify(data, null, 4);
                    } else {
                        responseLog.textContent = await response.text();
                    }
                }

            } catch (error) {
                statusBadge.className = "badge bg-danger";
                statusBadge.textContent = "通信例外";
                responseLog.textContent = "例外エラーが発生しました:\n" + error;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-play me-1"></i> 処理を実行';
            }
        });

        // Excelエクスポートボタンをクリックした際の処理
        document.getElementById('exportBtn').addEventListener('click', function() {
            if (currentExcelPath) {
                // ダウンロード用URLにパスをパラメータとして渡し、ブラウザでファイルを開きます
                window.location.href = `/download-excel/?path=${encodeURIComponent(currentExcelPath)}`;
            }
        });

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
